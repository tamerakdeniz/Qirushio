<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-center relative overflow-hidden font-body-md">
<!-- Decorative Background Pattern -->
<div class="absolute inset-0 bg-pattern z-0 pointer-events-none"></div>
<!-- Main Content Container -->
<main class="z-10 flex flex-col items-center justify-center px-container-padding-mobile md:px-container-padding-desktop w-full max-w-md mx-auto text-center">
<!-- Animated Graphic Area -->
<div class="relative w-48 h-48 mb-stack-lg flex items-center justify-center">
<!-- Glow Effect -->
<div class="absolute inset-0 bg-primary-container rounded-full blur-[40px] opacity-30 animate-pulse-glow"></div>
<!-- Central Icon -->
<div class="relative z-10 w-32 h-32 bg-white rounded-full shadow-[0_8px_24px_rgba(255,126,51,0.2)] flex items-center justify-center animate-bounce-slight">
<span class="material-symbols-outlined text-[80px] text-primary animate-spin-slow" data-icon="smart_toy">smart_toy</span>
</div>
<!-- Orbiting Elements (Optional details to add excitement) -->
<div class="absolute inset-0 animate-[spin_4s_linear_infinite]">
<span class="material-symbols-outlined absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 text-secondary text-2xl" data-icon="star">star</span>
</div>
<div class="absolute inset-0 animate-[spin_5s_linear_infinite_reverse]">
<span class="material-symbols-outlined absolute bottom-0 right-1/4 text-tertiary-container text-xl" data-icon="bolt">bolt</span>
</div>
</div>
<!-- Typography -->
<h1 class="font-display-mobile text-display-mobile text-on-background mb-stack-sm tracking-tight">Sorular hazırlanıyor...</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant mb-stack-lg">AI soruları senin için seçiyor.</p>
<!-- Progress Bar Section -->
<div class="w-full bg-white p-stack-md rounded-[24px] shadow-[0_4px_16px_rgba(0,88,190,0.1)] flex flex-col gap-stack-sm mb-stack-lg relative overflow-hidden">
<!-- Subtle tint overlay for the card -->
<div class="absolute top-0 left-0 right-0 h-8 bg-secondary-container opacity-5 rounded-t-[24px]"></div>
<div class="flex justify-between items-center z-10">
<span class="font-label-bold text-label-bold text-secondary">Tarih Kategorisi</span>
<span class="font-label-bold text-label-bold text-on-surface-variant">75%</span>
</div>
<!-- The Progress Bar -->
<div class="w-full h-3 bg-surface-container-high rounded-full overflow-hidden z-10">
<div class="h-full bg-gradient-to-r from-secondary to-secondary-fixed-dim rounded-full transition-all duration-1000 ease-out" style="width: 75%;"></div>
</div>
</div>
<!-- Room Info Summary -->
<div class="flex gap-gutter items-center justify-center w-full">
<div class="flex items-center gap-base bg-surface-container px-4 py-2 rounded-full">
<span class="material-symbols-outlined text-on-surface-variant text-sm" data-icon="group">group</span>
<span class="font-label-bold text-label-bold text-on-surface-variant">4 Oyuncu</span>
</div>
<div class="flex items-center gap-base bg-surface-container px-4 py-2 rounded-full">
<span class="material-symbols-outlined text-on-surface-variant text-sm" data-icon="timer">timer</span>
<span class="font-label-bold text-label-bold text-on-surface-variant">15 Saniye/Soru</span>
</div>
</div>
</main>
<script>
        // Simple script to simulate progress bar advancing
        document.addEventListener('DOMContentLoaded', () => {
            const progressBar = document.querySelector('.bg-gradient-to-r');
            const progressText = document.querySelector('.text-on-surface-variant.font-label-bold:last-child');
            let progress = 75;

            const interval = setInterval(() => {
                if (progress < 98) {
                    progress += Math.random() * 5;
                    if(progress > 98) progress = 98; // Cap it before real load
                    progressBar.style.width = `${progress}%`;
                    progressText.textContent = `${Math.floor(progress)}%`;
                } else {
                    clearInterval(interval);
                    // In a real app, this is where you'd redirect
                    setTimeout(() => {
                        progressText.textContent = 'Hazır!';
                        progressBar.style.width = '100%';
                    }, 500);
                }
            }, 800);
        });
    </script>
</body></html>
